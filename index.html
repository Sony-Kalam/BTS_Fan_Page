<html>
    <head> 
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>BTS Fan Page</title>
        <meta name="description" content="Sony Kalam's BTS fan page featuring albums, member profiles, and updates.">
        <link rel="stylesheet" href="style.css">
        <link rel="icon" type="image/png" href="images/BTS.png">
        <style>
            body{
                background:linear-gradient(100deg, #3d0553, #7e2db8, #db5ae1);
                margin-top: 140px;
            }
            img.zoom{
                transition: 0.5s;
            } 
            img.zoom:hover{
                transform:scale(1.1);
            }
        </style>
    </head>
    <body>
       <header>
        <div style="display:flex;align-items: center;">
            <img src="images/BTS.png" alt="BTS logo" height="50px" width="40px">
            <span style="font-size:xx-large;margin-left: 20px;font-weight: bold;">BTS Fan Page</span>
        </div>
        <nav style="margin-right: 80px;">
            <a href="#about">About</a>
            <a href="#members">Members</a>
            <a href="#discover">Discover</a>
        </nav>
       </header>
       <div id="about" class="firstdiv">
            <div class="half">
                <p style="font-size: x-large;">Welcome to the BTS Fan Page!</p>
                <br>
                <p>Everything you love about BTS in one place:💜</p>
                <br><br>
                <a href="About.html">
                    <button style="padding: 10px;border-radius: 5px;cursor: pointer;">Learn More</button>
                </a>
            </div>
            <div class="half">
                <img src="images/bts_members.png" alt="bts_photo" width="70%" height="70%">
            </div>
        </div>
       <div id="members" class="seconddiv">
            <h2 style="color:white;margin-left: 30px;">Meet The Members</h2>
            <div class="imgdiv">
                <figure class="fig">
                    <a href="jk.html">
                        <img src="images/jk.jpg" alt="jk" width="200px" height="200px" class="zoom">
                    </a>
                    <figcaption>Jeon Jung Kook</figcaption>
                </figure>
                <figure class="fig">
                    <a href="v.html">
                        <img src="images/v.jpg" alt="v" width="200px" height="200px" class="zoom">
                    </a>
                    <figcaption>Kim Tae Hyung</figcaption>
                </figure>
                <figure class="fig">
                    <a href="jimin.html">
                        <img src="images/jimin.jpg" alt="jimin" width="200px" height="200px" class="zoom">
                    </a>
                    <figcaption>Park Jimin</figcaption>
                </figure>
                <figure class="fig">
                    <a href="hobi.html">
                        <img src="images/hobi.jpg" alt="hobi" width="200px" height="200px" class="zoom">
                    </a>
                    <figcaption>Jung Ho Seok</figcaption>
                </figure>
                <figure class="fig">
                    <a href="rm.html">
                        <img src="images/rm.jpg" alt="rm" width="200px" height="200px" class="zoom">
                    </a>
                    <figcaption>Kim Nam Joon</figcaption>
                </figure>
                <figure class="fig">
                    <a href="suga.html">
                        <img src="images/suga.jpg" alt="suga" width="200px" height="200px" class="zoom">
                    </a>
                    <figcaption>Min Yoongi</figcaption>
                </figure>
                <figure class="fig">
                    <a href="jin.html">
                        <img src="images/jin.jpg" alt="jin" width="200px" height="200px" class="zoom">
                    </a>
                    <figcaption>Kim Seok Jin</figcaption>
                </figure>
            </div>
       </div>
       <div id="discover" class="thirddiv">
            <h2 style="margin-left: 30px;">Songs and Albums</h2>
            <div style="display: flex;flex-wrap: wrap;">
            <a href="songs.html">
                <figure>
                    <img src="images/songs.avif" alt="songs" class="zoom">
                    <figcaption style="font-style: italic;font-size: medium;">BTS Songs</figcaption>
                </figure>
            </a>
            <a href="albums.html">
                <figure>
                    <img src="images/albums.jpg" alt="albums" class="zoom">
                    <figcaption style="font-style: italic;font-size: medium;">BTS Albums</figcaption>
                </figure>
            </a>
            </div>
       </div>
       <footer>
            <h2 style="color:white;margin-left: 30px;">Stay Connected with BTS</h2>
            <div class="footer">
                <a href="https://ibighit.com/bts/" target="_blank"><img src="images/bighit.png" alt="bighit" class="zoom"></a>
                <a href="https://www.instagram.com/bts.bighitofficial/" target="_blank"><img src="images/insta.jpg" alt="insta" class="zoom"></a>
                <a href="https://twitter.com/BTS_twt" target="_blank"><img src="images/twt.png" alt="twitter" class="zoom"></a>
                <a href="https://www.facebook.com/bangtan.official" target="_blank"><img src="images/fb.png" alt="facebook" class="zoom"></a>
                <a href="https://www.youtube.com/user/BANGTANTV" target="_blank"><img src="images/ytb.png" alt="youtube" class="zoom"></a>
            </div>     
       </footer>
    </body>
</html>
