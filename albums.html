        <script>
           function songs(albumId){
                var figure = document.getElementById(albumId);
                var img = figure.querySelector("img");
                var list = figure.querySelector(".songlist");
                if(list.style.display === "none"){
                    img.style.display = "none";   // hide image
                    list.style.display = "block"; // show songs
                } else {
                    img.style.display = "block";  // show image back
                    list.style.display = "none";  // hide songs
                }
            }
        </script>
